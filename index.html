<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Invite</title>

<link rel="stylesheet" href="./style.css">

<script src="https://unpkg.com/gsap@3/dist/gsap.min.js"></script>
<script src="https://unpkg.com/gsap@3/dist/ScrollTrigger.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Yatra+One&family=Great+Vibes&display=swap" rel="stylesheet">
</head>

<body>

<section class="intro">
  <video id="introVideo" autoplay muted playsinline>
    <source src="./assets/intro.mp4" type="video/mp4">
  </video>

  <div class="overlay">
    <img src="./assets/ganesh.png" class="ganesh">

    <div class="shloka">
      <div class="line"><span>वक्रतुण्ड महाकाय</span></div>
      <div class="line"><span>सूर्यकोटि समप्रभ</span></div>
      <div class="line"><span>निर्विघ्नं कुरु मे देव</span></div>
      <div class="line"><span>सर्वकार्येषु सर्वदा</span></div>
    </div>
  </div>

  <div class="scroll-indicator">
    <span>Scroll</span>
    <div class="arrow"></div>
  </div>
</section>


<!-- HALDI -->
<section class="panel haldi">

  <!-- 🔥 TITLE -->
  <div class="haldi-title">
    <span>The Yellow Tales</span>
  </div>

  <div class="content"></div>

  <!-- 🔥 PETALS -->
  <div class="petals"></div>

</section>


<section class="panel ring">
  <div class="content"><h2>Ring Ceremony</h2></div>
</section>

<section class="panel wedding">
  <div class="content"><h2>Wedding</h2></div>
</section>

<section class="panel thankyou">
  <div class="content">
    <h2>Rohan & Shyamili</h2>
    <p>Can't wait to celebrate with you ❤️</p>
  </div>
</section>

<script src="./script.js"></script>

</body>
</html>
