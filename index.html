<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invite</title>

<link rel="stylesheet" href="style.css?v=final1">

<!-- GSAP -->
<script src="https://unpkg.com/gsap@3/dist/gsap.min.js"></script>
<script src="https://unpkg.com/gsap@3/dist/ScrollTrigger.min.js"></script>

<!-- Lottie -->
<script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

<!-- FONTS -->
<link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Sanskrit&family=Yatra+One&display=swap" rel="stylesheet">

</head>

<body>

<section class="video-section">

  <video id="introVideo" muted playsinline preload="auto">
    <source src="assets/intro.mp4" type="video/mp4">
  </video>

  <div class="overlay">
    <img src="assets/ganesh.png" class="ganesh">

    <div class="shloka">
      <span>वक्रतुण्ड महाकाय</span>
      <span>सूर्यकोटि समप्रभ</span>
      <span>निर्विघ्नं कुरु मे देव</span>
      <span>सर्वकार्येषु सर्वदा</span>
    </div>
  </div>

</section>

<!-- EVENTS -->
<section class="panel haldi">
  <div class="content">
    <h2>Haldi</h2>
    <p>8 May • 4 PM</p>
  </div>
</section>

<section class="panel ring">
  <div class="content">
    <h2>Ring Ceremony</h2>
    <p>9 May • 7 PM</p>
  </div>
</section>

<section class="panel wedding">
  <div class="content">
    <h2>Wedding</h2>
    <p>10 May</p>
  </div>
</section>

<section class="panel thankyou">
  <div class="content">
    <h2>Rohan & Shyamili</h2>
    <p>Can't wait to celebrate with you ❤️</p>
  </div>
</section>

<script src="script.js?v=final1"></script>

</body>
</html>
